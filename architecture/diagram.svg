<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- INPUT -->
<rect x="215" y="20" width="250" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="340" y="41" text-anchor="middle" dominant-baseline="central">Input</text>
<text font-size="12" font-weight="400" fill="#185FA5" x="340" y="59" text-anchor="middle" dominant-baseline="central">Noisy image · 3 × 32 × 32</text>

<!-- Arrow input → encoder -->
<line x1="340" y1="72" x2="340" y2="98" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ENCODER REGION -->
<rect x="60" y="100" width="560" height="280" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5" fill-opacity="0.35"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="122" text-anchor="middle" dominant-baseline="central">Encoder</text>

<!-- Enc Block 1 -->
<rect x="90" y="132" width="500" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="153" text-anchor="middle" dominant-baseline="central">Enc block 1 — Conv2d(3→32, 3×3) + BN + ReLU</text>
<text font-size="12" font-weight="400" fill="#534AB7" x="340" y="171" text-anchor="middle" dominant-baseline="central">32 × 32 × 32 → MaxPool2d(2×2) → 32 × 16 × 16</text>

<line x1="340" y1="188" x2="340" y2="212" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Enc Block 2 -->
<rect x="90" y="214" width="500" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="235" text-anchor="middle" dominant-baseline="central">Enc block 2 — Conv2d(32→64, 3×3) + BN + ReLU</text>
<text font-size="12" font-weight="400" fill="#534AB7" x="340" y="253" text-anchor="middle" dominant-baseline="central">64 × 16 × 16 → MaxPool2d(2×2) → 64 × 8 × 8</text>

<line x1="340" y1="270" x2="340" y2="294" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Enc Block 3 -->
<rect x="90" y="296" width="500" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="317" text-anchor="middle" dominant-baseline="central">Enc block 3 — Conv2d(64→128, 3×3) + BN + ReLU</text>
<text font-size="12" font-weight="400" fill="#534AB7" x="340" y="335" text-anchor="middle" dominant-baseline="central">128 × 8 × 8 → MaxPool2d(2×2) → 128 × 4 × 4</text>

<line x1="340" y1="352" x2="340" y2="374" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- BOTTLENECK -->
<rect x="155" y="376" width="370" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#633806" x="340" y="397" text-anchor="middle" dominant-baseline="central">Bottleneck — 128 × 4 × 4</text>
<text font-size="12" font-weight="400" fill="#854F0B" x="340" y="415" text-anchor="middle" dominant-baseline="central">2 048 latent units · compression ≈ 1.5×</text>

<line x1="340" y1="432" x2="340" y2="454" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- DECODER REGION -->
<rect x="60" y="456" width="560" height="280" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5" fill-opacity="0.35"/>
<text font-size="14" font-weight="500" fill="#085041" x="340" y="478" text-anchor="middle" dominant-baseline="central">Decoder</text>

<!-- Dec Block 1 -->
<rect x="90" y="488" width="500" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="340" y="509" text-anchor="middle" dominant-baseline="central">Dec block 1 — ConvTranspose2d(128→64) + Conv2d + BN + ReLU</text>
<text font-size="12" font-weight="400" fill="#0F6E56" x="340" y="527" text-anchor="middle" dominant-baseline="central">128 × 4 × 4 → 64 × 8 × 8</text>

<line x1="340" y1="544" x2="340" y2="568" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Dec Block 2 -->
<rect x="90" y="570" width="500" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="340" y="591" text-anchor="middle" dominant-baseline="central">Dec block 2 — ConvTranspose2d(64→32) + Conv2d + BN + ReLU</text>
<text font-size="12" font-weight="400" fill="#0F6E56" x="340" y="609" text-anchor="middle" dominant-baseline="central">64 × 8 × 8 → 32 × 16 × 16</text>

<line x1="340" y1="626" x2="340" y2="650" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Dec Block 3 -->
<rect x="90" y="652" width="500" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="340" y="673" text-anchor="middle" dominant-baseline="central">Dec block 3 — ConvTranspose2d(32→3) + Conv2d + Sigmoid</text>
<text font-size="12" font-weight="400" fill="#0F6E56" x="340" y="691" text-anchor="middle" dominant-baseline="central">32 × 16 × 16 → 3 × 32 × 32</text>

<line x1="340" y1="708" x2="340" y2="732" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OUTPUT -->
<rect x="215" y="734" width="250" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#173404" x="340" y="755" text-anchor="middle" dominant-baseline="central">Output</text>
<text font-size="12" font-weight="400" fill="#3B6D11" x="340" y="773" text-anchor="middle" dominant-baseline="central">Clean image · 3 × 32 × 32</text>

<line x1="340" y1="786" x2="340" y2="810" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LOSS -->
<rect x="215" y="812" width="250" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#4A1B0C" x="340" y="833" text-anchor="middle" dominant-baseline="central">MSE Loss</text>
<text font-size="12" font-weight="400" fill="#993C1D" x="340" y="851" text-anchor="middle" dominant-baseline="central">‖ x̂ − x ‖² / N  ↓  lower is better</text>

<!-- STATS ROW -->
<rect x="60" y="882" width="168" height="28" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="12" font-weight="400" fill="#444441" x="144" y="896" text-anchor="middle" dominant-baseline="central">~182 K params</text>

<rect x="256" y="882" width="168" height="28" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="12" font-weight="400" fill="#444441" x="340" y="896" text-anchor="middle" dominant-baseline="central">Gaussian σ = 0.1</text>

<rect x="452" y="882" width="168" height="28" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="12" font-weight="400" fill="#444441" x="536" y="896" text-anchor="middle" dominant-baseline="central">24.62 dB PSNR</text>

</svg>
